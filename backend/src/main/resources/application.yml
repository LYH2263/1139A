spring:
  application:
    name: wordmind-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:this-is-a-very-long-secret-key-for-wordmind-jwt-token-generation-must-be-at-least-512-bits-long-for-hs512}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3139}

logging:
  level:
    com.wordmind: DEBUG
    org.springframework.security: DEBUG
